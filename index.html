<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>GoksuPlay</title>
</head>
<body style="background:black;color:white;text-align:center;padding-top:100px;font-family:Arial;">

<h1>🎰 GoksuPlay</h1>

<div id="coin">Coin: 100</div>

<button onclick="spin()">SPIN</button>

<div id="result"></div>

<script>
let coin = 100;

function spin(){
  let r = Math.floor(Math.random()*3);

  if(r===0){
    document.getElementById("result").innerText="Kaybettin";
  }else{
    coin+=10;
    document.getElementById("result").innerText="+10 Coin";
  }

  document.getElementById("coin").innerText="Coin: "+coin;
}
</script>

</body>
</html>
